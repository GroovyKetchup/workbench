<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacOS Style Shell</title>

    <!-- 引入 Lucide 图标库 -->
    <script src="https://kwaidoo.com/cdn_general/libs/lucide/0.562.0/umd/lucide.min.js"></script>

    <!--
      ℹ️ 样式说明:
      - 深度定制为 MacOS Finder 风格
      - 保留了原有 CDP 变量名以兼容 SDK 主题切换，但重新定义了默认值
    -->
    <style>
        /* ========================================
           MacOS 主题变量映射
           ======================================== */
        :root {
            /* 基础色调 - Light Mode (默认) */
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7; /* Finder 背景灰 */
            --bg-tertiary: #e5e5e5;

            --text-primary: #1d1d1f;
            --text-secondary: #86868b;
            --text-tertiary: #a1a1a6;

            --border-color: #d1d1d1;
            --divider-color: rgba(0, 0, 0, 0.1);

            /* MacOS 系统色 */
            --system-blue: #007AFF;
            --system-blue-hover: #0062cc;
            --selection-bg: rgba(0, 122, 255, 0.1);
            --sidebar-bg: rgba(242, 242, 247, 0.8); /* 毛玻璃基底 */
            --sidebar-width: 260px;

            /* 窗口控制按钮颜色 */
            --win-red: #FF5F57;
            --win-yellow: #FEBC2E;
            --win-green: #28C840;

            /* 阴影 */
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.1);
        }

        /* 黑暗模式变量 (通过 JS 动态覆盖) */
        [data-theme='dark'] {
            --bg-primary: #1e1e1e;
            --bg-secondary: #2c2c2e;
            --bg-tertiary: #3a3a3c;
            --text-primary: #ffffff;
            --text-secondary: #98989d;
            --border-color: #48484a;
            --divider-color: rgba(255, 255, 255, 0.1);
            --sidebar-bg: rgba(40, 40, 40, 0.8);
            --selection-bg: rgba(10, 132, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased; /* 让字体更像 Mac */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-size: 13px; /* Mac 标准字号 */
            display: flex;
            justify-content: center;
            align-items: center;
            /* 模拟整个桌面背景，如果是全屏应用可以去掉这个 padding */
            background-image: url('https://images.unsplash.com/photo-1579546929518-9e396f3cc809?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80');
            background-size: cover;
            background-position: center;
        }

        /* 模拟 Mac 窗口容器 */
        .app-window {
            width: 95vw;
            height: 90vh;
            background: var(--bg-primary);
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* ========================================
           侧边栏 (Sidebar) - Finder 风格
           ======================================== */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px); /* 毛玻璃效果 */
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: background 0.3s;
        }

        /* 顶部红绿灯区 */
        .traffic-lights-area {
            height: 52px; /* 与 Toolbar 高度一致 */
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            /* 允许拖拽窗口的区域(模拟) */
            -webkit-app-region: drag;
        }

        .traffic-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            position: relative;
            border: 0.5px solid rgba(0,0,0,0.1);
        }
        .traffic-light.red { background: var(--win-red); }
        .traffic-light.yellow { background: var(--win-yellow); }
        .traffic-light.green { background: var(--win-green); cursor: pointer;}

        /* 鼠标悬停显示图标模拟 */
        .traffic-lights-area:hover .traffic-light.red::after { content: '×'; position: absolute; left: 2px; top: -1px; color: rgba(0,0,0,0.5); font-size: 9px;}
        .traffic-lights-area:hover .traffic-light.yellow::after { content: '-'; position: absolute; left: 2px; top: -2px; color: rgba(0,0,0,0.5); font-size: 10px; font-weight: bold;}
        .traffic-lights-area:hover .traffic-light.green::after { content: '+'; position: absolute; left: 2px; top: -1px; color: rgba(0,0,0,0.5); font-size: 9px;}

        /* 应用标题/Logo */
        .sidebar-app-title {
            padding: 0 20px 10px 20px;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 菜单列表 */
        .menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        /* 菜单组标题 */
        .menu-group-title {
            padding: 12px 10px 4px 10px;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            opacity: 0.8;
        }

        /* 菜单项 */
        .menu-item {
            padding: 6px 10px;
            margin-bottom: 2px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.1s;
            color: var(--text-primary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .menu-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        /* 选中态 - 经典的 Mac 蓝 */
        .menu-item.active {
            background: var(--system-blue);
            color: #fff !important;
        }

        /* 选中态下的图标颜色修正 */
        .menu-item.active .menu-icon {
            /* Lucide SVG 使用 currentColor，所以这里会自动变成白色，无需滤镜 */
            color: #fff;
        }

        /* 黑暗模式下的 Hover */
        [data-theme='dark'] .menu-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .menu-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            color: var(--text-secondary); /* 默认灰色图标 */
        }

        /* 专门适配 Lucide SVG 的大小 */
        .menu-icon svg {
            width: 16px;
            height: 16px;
            stroke-width: 2px;
        }

        /* 选中时图标变白 */
        .menu-item.active .menu-icon {
            color: #fff;
        }

        /* ========================================
           主内容区 (Main Content)
           ======================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg-primary);
            position: relative;
        }

        /* 顶部工具栏 - Toolbar 风格 */
        .top-bar {
            height: 52px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: var(--bg-primary);
            /* 如果想让 toolbar 也透出背景，可以加透明度，但通常右侧是不透的 */
        }

        /* 导航操作区 (前进后退) */
        .nav-controls {
            display: flex;
            gap: 6px;
            color: var(--text-secondary);
            align-items: center;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            cursor: pointer;
            border-radius: 6px;
            color: var(--text-primary);
        }
        .nav-btn:hover { background: var(--bg-secondary); }
        .nav-btn svg { width: 16px; height: 16px; stroke-width: 2.5px; }

        /* 搜索框 - 居中胶囊样式 */
        .command-search {
            flex: 1;
            max-width: 400px;
            position: relative;
            margin: 0 20px;
        }

        .search-input {
            width: 100%;
            height: 28px;
            padding: 0 30px;
            border: 1px solid var(--border-color);
            border-radius: 6px; /* Mac 风格圆角 */
            font-size: 12px;
            outline: none;
            background: var(--bg-secondary);
            color: var(--text-primary);
            text-align: center; /* Mac 默认居中，聚焦后居左，这里简化居中 */
            transition: all 0.2s;
        }

        .search-input:focus {
            text-align: left;
            border-color: var(--system-blue);
            background: var(--bg-primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            color: var(--text-tertiary);
            pointer-events: none;
        }
        .search-icon svg { width: 14px; height: 14px; }

        .search-shortcut {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            color: var(--text-tertiary);
            border: 1px solid var(--border-color);
            padding: 1px 4px;
            border-radius: 3px;
            pointer-events: none;
        }

        /* 右侧工具栏按钮组 */
        .toolbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-btn {
            height: 28px;
            padding: 0 10px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            font-size: 12px;
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            box-shadow: 0 1px 1px rgba(0,0,0,0.05);
        }

        .toolbar-btn:active {
            background: #e5e5e5;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);
        }

        .toolbar-btn svg {
            width: 14px;
            height: 14px;
        }

        /* 下拉菜单样式 - Popover 风格 */
        .popover-menu {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: var(--bg-primary);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            min-width: 200px;
            display: none;
            z-index: 2000;
            padding: 4px;
            animation: fadeIn 0.1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .toolbar-btn.open .popover-menu { display: block; }

        .popover-item {
            padding: 6px 10px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .popover-item:hover {
            background: var(--system-blue);
            color: white;
        }

        .popover-divider {
            height: 1px;
            background: var(--divider-color);
            margin: 4px 6px;
        }

        .popover-header {
            padding: 4px 10px;
            font-size: 10px;
            color: var(--text-tertiary);
            font-weight: 600;
            text-transform: uppercase;
        }

        /* 用户头像 */
        .user-avatar-small {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--system-blue);
            color: white;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 内容区域 */
        .content-area {
            flex: 1;
            overflow: hidden;
            background: var(--bg-primary);
        }

        #content-area {
            width: 100%;
            height: 100%;
        }

        /* 滚动条隐藏或细化 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { background: var(--bg-primary); } /* 移除壁纸 */
            .app-window { width: 100%; height: 100%; border-radius: 0; border: none;}
            .sidebar { position: absolute; height: 100%; z-index: 100; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 2px 0 10px rgba(0,0,0,0.1);}
            .sidebar.mobile-open { transform: translateX(0); }
            .traffic-lights-area { display: none; }
            .sidebar-app-title { margin-top: 20px; }
            .nav-controls { display: flex; /* 这里可以用作菜单切换按钮 */ }
        }
    </style>
</head>

<body>
<!-- 模拟的 Mac 窗口容器 -->
<div class="app-window">

    <!-- 侧边栏菜单 -->
    <aside class="sidebar" id="sidebar">
        <!-- 经典的红绿灯 -->
        <div class="traffic-lights-area">
            <div class="traffic-light red" title="Close"></div>
            <div class="traffic-light yellow" title="Minimize"></div>
            <div class="traffic-light green" title="Fullscreen" onclick="toggleFullScreen()"></div>
        </div>

        <div class="sidebar-app-title">Favorites</div>

        <nav class="menu-list">
            <!-- 菜单将通过 JavaScript 动态渲染 -->
            <!-- 骨架屏 -->
            <div style="padding: 0 10px; opacity: 0.5;">
                <div style="height: 24px; background: #ddd; margin-bottom: 8px; border-radius: 4px;"></div>
                <div style="height: 24px; background: #ddd; margin-bottom: 8px; border-radius: 4px;"></div>
                <div style="height: 24px; background: #ddd; margin-bottom: 8px; border-radius: 4px;"></div>
            </div>
        </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 顶部工具栏 -->
        <header class="top-bar">
            <div class="nav-controls">
                <!-- 移动端菜单开关 (默认隐藏，小屏显示逻辑需配合 CSS) -->
                <div class="nav-btn" onclick="toggleMobileSidebar()" style="display: none;">
                    <i data-lucide="menu"></i>
                </div>
                <div class="nav-btn">
                    <i data-lucide="chevron-left"></i>
                </div>
                <div class="nav-btn">
                    <i data-lucide="chevron-right"></i>
                </div>
            </div>

            <div class="command-search">
                    <span class="search-icon">
                        <i data-lucide="search"></i>
                    </span>
                <input type="text" class="search-input" placeholder="Search" readonly />
                <span class="search-shortcut">⌘K</span>
            </div>

            <div class="toolbar-right">
                <!-- AI 按钮 -->
                <div class="toolbar-btn ai-button">
                    <i data-lucide="sparkles"></i>
                    <span>AI Assistant</span>
                </div>

                <!-- 主题切换 -->
                <div class="toolbar-btn" id="theme-button" onclick="toggleThemeMenu()">
                        <span id="theme-icon" style="display:flex;">
                            <i data-lucide="sun-moon"></i>
                        </span>
                    <div class="popover-menu">
                        <div class="popover-header">Appearance</div>
                        <div id="theme-modes-container"></div>
                        <div class="popover-divider"></div>
                        <div class="popover-header">Accent Color</div>
                        <div id="theme-presets-container"></div>
                    </div>
                </div>

                <!-- 用户菜单 -->
                <div class="toolbar-btn user-menu-btn" onclick="toggleUserMenu()">
                    <div class="user-avatar-small" id="user-avatar">U</div>
                    <span id="user-name" style="max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">User</span>
                    <div class="popover-menu user-dropdown">
                        <div class="popover-item" onclick="handleLogout()" style="color: #ff3b30;">
                                <span style="display:flex;align-items:center;gap:6px;">
                                    <i data-lucide="log-out" style="width:14px;height:14px;"></i>
                                    Logout
                                </span>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 内容区域 -->
        <div class="content-area">
            <!-- 🔥 Portal 渲染目标容器 -->
            <div id="content-area"></div>
        </div>
    </main>
</div>

<script>
    // 全局变量
    let menuController = null;
    let currentSdk = null;
    let currentThemeState = null;

    /**
     * 🔄 刷新 Lucide 图标
     */
    function refreshIcons() {
        if (window.lucide) {
            window.lucide.createIcons();
        }
    }

    /**
     * 🖥️ 全屏切换 (绿色按钮功能)
     */
    function toggleFullScreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
            });
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
        }
    }

    /**
     * 📱 移动端侧边栏切换
     */
    function toggleMobileSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('mobile-open');
    }

    /**
     * 🔔 显示 Toast 提示(MacOS 风格)
     */
    async function showToast(message, options = {}) {
        const { type = 'info', description, duration } = options;

        if (currentSdk && typeof currentSdk.toast === 'function') {
            try {
                await currentSdk.toast(message, { type, description, duration });
                return;
            } catch (error) { console.error(error); }
        }

        // 降级方案: 原生 DOM
        let container = document.getElementById('toast-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toast-container';
            container.style.cssText = `
                    position: fixed; top: 20px; right: 20px; z-index: 10000;
                    display: flex; flex-direction: column; gap: 10px;
                `;
            document.body.appendChild(container);
        }

        const toast = document.createElement('div');
        const isDark = document.body.getAttribute('data-theme') === 'dark';

        // MacOS Notification Style
        toast.style.cssText = `
                background: ${isDark ? 'rgba(40,40,40,0.9)' : 'rgba(255,255,255,0.9)'};
                backdrop-filter: blur(10px);
                color: var(--text-primary);
                padding: 12px 16px;
                border-radius: 12px;
                box-shadow: 0 4px 20px rgba(0,0,0,0.15);
                border: 1px solid var(--border-color);
                min-width: 260px;
                font-size: 13px;
                animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
                display: flex; gap: 10px; align-items: start;
            `;

        // 用简单的 Emoji 作为 Toast 图标，因为 Toast 是动态创建的，不想过度依赖 Lucide 重绘
        const iconMap = { success: '✅', error: '⛔️', warning: '⚠️', info: 'ℹ️' };

        toast.innerHTML = `
                <div style="font-size: 18px;">${iconMap[type] || 'ℹ️'}</div>
                <div>
                    <div style="font-weight: 600;">${message}</div>
                    ${description ? `<div style="font-size: 12px; opacity: 0.7; margin-top:2px;">${description}</div>` : ''}
                </div>
            `;

        container.appendChild(toast);

        // CSS Animation
        const style = document.createElement('style');
        style.innerHTML = `@keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }`;
        document.head.appendChild(style);

        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(20px)';
            toast.style.transition = 'all 0.3s';
            setTimeout(() => toast.remove(), 300);
        }, duration || 3000);
    }

    // 🎨 切换主题菜单
    function toggleThemeMenu() {
        const btn = document.getElementById('theme-button');
        btn.classList.toggle('open');
    }

    // 🎨 应用主题 (核心逻辑修改: 映射到 MacOS 变量)
    function applyTheme(themeState) {
        const { effectiveMode, currentColors } = themeState;
        const root = document.documentElement;

        // 设置 data-theme 属性以供 CSS 选择器使用
        document.body.setAttribute('data-theme', effectiveMode);

        // 更新强调色 (Finder 的选中色)
        root.style.setProperty('--system-blue', `hsl(${currentColors.light.primary})`);

        // 如果是深色模式，更新变量
        if (effectiveMode === 'dark') {
            root.style.setProperty('--bg-primary', '#1e1e1e');
            root.style.setProperty('--bg-secondary', '#2c2c2e');
            root.style.setProperty('--text-primary', '#ffffff');
            root.style.setProperty('--text-secondary', '#98989d');
            root.style.setProperty('--border-color', '#48484a');
            root.style.setProperty('--sidebar-bg', 'rgba(40, 40, 40, 0.85)');
        } else {
            root.style.setProperty('--bg-primary', '#ffffff');
            root.style.setProperty('--bg-secondary', '#f5f5f7');
            root.style.setProperty('--text-primary', '#1d1d1f');
            root.style.setProperty('--text-secondary', '#86868b');
            root.style.setProperty('--border-color', '#d1d1d1');
            root.style.setProperty('--sidebar-bg', 'rgba(242, 242, 247, 0.85)');
        }
    }

    // 🎨 订阅主题变化
    async function subscribeTheme(sdk) {
        try {
            currentThemeState = await sdk.app.theme.getState();
            applyTheme(currentThemeState);
            await loadThemeOptions(sdk);
            sdk.app.theme.onChange((state) => {
                currentThemeState = state;
                applyTheme(state);
                updateThemeUI(state);
            });
        } catch (error) { console.error('Theme Error', error); }
    }

    // 🎨 加载主题选项
    async function loadThemeOptions(sdk) {
        try {
            const modes = await sdk.app.theme.getModes();
            const modesContainer = document.getElementById('theme-modes-container');
            const modeLabels = { 'system': '🖥️ System', 'light': '☀️ Light', 'dark': '🌙 Dark' };

            modesContainer.innerHTML = modes.map(mode => `
                    <div class="popover-item ${currentThemeState?.mode === mode ? 'active' : ''}"
                         onclick="changeThemeMode('${mode}')">
                        <span>${modeLabels[mode] || mode}</span>
                        ${currentThemeState?.mode === mode ? '<span>✓</span>' : ''}
                    </div>
                `).join('');

            const presets = await sdk.app.theme.getPresets();
            const presetsContainer = document.getElementById('theme-presets-container');
            presetsContainer.innerHTML = presets.map(preset => `
                    <div class="popover-item" onclick="changeThemePreset('${preset.id}')">
                        <span style="display:flex;align-items:center;gap:6px;">
                            <span style="width:10px;height:10px;border-radius:50%;background:hsl(${preset.colors.light.primary})"></span>
                            ${preset.name}
                        </span>
                        ${currentThemeState?.activePresetId === preset.id ? '<span>✓</span>' : ''}
                    </div>
                `).join('');
        } catch (e) {}
    }

    function updateThemeUI(state) {
        // 重新加载选项列表以更新打钩状态
        if(currentSdk) loadThemeOptions(currentSdk);
    }

    async function changeThemeMode(mode) {
        if (currentSdk) await currentSdk.app.theme.setMode(mode);
    }

    async function changeThemePreset(presetId) {
        if (currentSdk) await currentSdk.app.theme.setPreset(presetId);
    }

    // 👤 用户菜单
    function toggleUserMenu() {
        const btn = document.querySelector('.user-menu-btn');
        btn.classList.toggle('open');
    }

    async function handleLogout() {
        if (currentSdk) await currentSdk.app.logout();
    }

    // 点击外部关闭菜单
    document.addEventListener('click', function (e) {
        if (!e.target.closest('.user-menu-btn')) {
            document.querySelector('.user-menu-btn')?.classList.remove('open');
        }
        if (!e.target.closest('#theme-button')) {
            document.getElementById('theme-button')?.classList.remove('open');
        }
    });

    // 📋 初始化菜单控制器
    async function initMenuController(sdk, menuTree) {
        const menuList = document.querySelector('.menu-list');
        try {
            menuController = sdk.controllers.createMenu();
            menuController.onStateChange((state) => renderMenu(state));
            await menuController.init(menuTree, { contentContainer: '#content-area' });
        } catch (error) {
            console.error(error);
            menuList.innerHTML = '<div style="padding:20px;text-align:center;color:#999">Load Failed</div>';
        }
    }

    // 🔥 核心: 渲染 Finder 风格菜单
    function renderMenu(state) {
        const menuList = document.querySelector('.menu-list');
        menuList.innerHTML = '';
        const { menuTree, activeId } = state;

        if (!menuTree || menuTree.length === 0) return;

        menuTree.forEach(item => {
            if (item.type === 'group' || item.type === 'Folder') {
                // 分组标题 (类似 Finder 侧边栏的 "Favorites", "iCloud")
                const groupTitle = document.createElement('div');
                groupTitle.className = 'menu-group-title';
                groupTitle.textContent = item.title;
                menuList.appendChild(groupTitle);

                if (item.children) {
                    item.children.forEach(child => {
                        menuList.appendChild(createMacMenuItem(child, activeId));
                    });
                }
            } else {
                menuList.appendChild(createMacMenuItem(item, activeId));
            }
        });

        // 渲染完成后刷新图标
        refreshIcons();
    }

    function createMacMenuItem(item, activeId) {
        const el = document.createElement('div');
        el.className = 'menu-item' + (item.id === activeId ? ' active' : '');

        // 图标逻辑:
        // 1. 如果 item.icon 存在且全是字母/短横线，视为 Lucide 图标名
        // 2. 如果不存在，自动根据类型判断
        // 3. 否则视为普通 Emoji 或字符
        let iconHtml = '';

        if (item.icon && /^[\w-]+$/.test(item.icon) && item.icon.length > 2) {
            // 假设是 Lucide 图标名 (例如 "home", "settings-2")
            iconHtml = `<i data-lucide="${item.icon}"></i>`;
        } else if (item.icon) {
            // 可能是 Emoji
            iconHtml = `<span>${item.icon}</span>`;
        } else {
            // 默认图标
            const isFolder = item.type === 'folder' || item.children?.length > 0;
            iconHtml = `<i data-lucide="${isFolder ? 'folder' : 'file-text'}"></i>`;
        }

        el.innerHTML = `
                <span class="menu-icon">${iconHtml}</span>
                <span style="flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${item.title}</span>
            `;

        el.addEventListener('click', async () => {
            if (menuController) await menuController.select(item);
        });

        return el;
    }

    // 🚀 初始化入口
    window.addEventListener('load', function () {
        // 页面加载完毕，先渲染一次静态图标
        refreshIcons();

        const sdk = window.semApp?.cdpSdk;
        if (!sdk) return;
        currentSdk = sdk;

        // 并行加载
        Promise.allSettled([
            (async () => {
                const user = await sdk.data.auth.getCurrentUser();
                if(user) {
                    document.getElementById('user-name').textContent = user.name;
                    document.getElementById('user-avatar').textContent = (user.name||'U')[0].toUpperCase();
                }
            })(),
            subscribeTheme(sdk),
            (async () => {
                const config = await sdk.data.getAppConfig();
                if(config?.appName) document.querySelector('.sidebar-app-title').textContent = config.appName;
            })(),
            (async () => {
                const menu = await sdk.data.getMenu();
                if(menu) initMenuController(sdk, menu);
            })()
        ]);
    });

    // 绑定搜索和AI事件
    document.querySelector('.search-input').addEventListener('click', () => currentSdk?.ui.commandPalette.open());
    document.querySelector('.ai-button').addEventListener('click', () => currentSdk?.ui.aiAssistant.open());

    // 清理
    window.addEventListener('beforeunload', () => menuController?.destroy());

</script>
</body>
</html>
