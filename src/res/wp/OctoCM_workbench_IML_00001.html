## OctoCM意图工作台 - 意图确认系统

企业级意图数据管理系统，支持系统、模块、场景及相关元素的全生命周期管理。

### 🎯 核心功能
- **系统管理**: 系统基本信息、建设动机、业务目标
- **模块管理**: 模块划分、层级关系、关键操作
- **场景管理**: 场景定义、场景类型、使用角色
- **数据管理**: 数据结构、属性定义、数据内容
- **行为管理**: 行为操作、主体客体、执行结果
- **约束管理**: 约束规则、对象类型、规则类型
- **编排管理**: 流程编排、正常流程、异常处理
- **展示管理**: 页面展示、展示内容、页面说明
- **验证管理**: 验证内容、验证方式、预期结果

### ⚠️ 重要规则

#### 🔴 强制性工作流程（最高优先级）
**每次接收到新需求时，必须严格遵循以下流程，违反此流程将导致数据重复和混乱：**

**⚠️ 适用范围：所有节点类型**
- **系统**、**模块**、**场景**、**数据**、**行为**、**约束**、**编排**、**展示**、**验证**
- 以上所有节点类型在创建前都必须先检查是否重复

**1. 第一步：调用 \`getIntentSummary()\` 检查重复**
   - 获取画布上所有现有节点的概要信息
   - 🚨 **严禁跳过此步骤直接创建节点**
   - 检查需求中的节点是否已经存在

**2. 第二步：判断节点是否重复**
   
   **重复判断标准（必须同时满足以下两个条件）：**
   - ✅ **上层xx编号（层级关系）一致**
     - 例如：两个模块都属于同一个系统（上层系统编号相同）
     - 例如：两个场景都属于同一个模块（上层模块编号相同）
   - ✅ **xx名称（显示名称）一致或意思相同**
     - 名称完全相同：如 "工单管理" = "工单管理"
     - 名称意思相同：如 "工单管理" ≈ "工单处理" ≈ "工单维护"
   
   **重复判断示例：**
   
   ✅ **判定为重复的情况：**
   - 现有："工单管理"模块（上层系统：OctoCM_System_abc123，取系统「编号」）
   - 新建："工单处理"模块（上层系统：OctoCM_System_abc123）
   - 原因：层级关系相同 + 名称意思相同
   - 处理：更新"工单管理"模块，不创建"工单处理"
   
   ❌ **判定为不重复的情况：**
   - 现有："工单管理"模块（上层系统：OctoCM_System_abc123）
   - 新建："工单管理"模块（上层系统：OctoCM_System_def456）
   - 原因：虽然名称相同，但层级关系不同（属于不同系统）
   - 处理：可以创建新的"工单管理"模块

**3. 第三步：根据重复判断结果执行操作**
   
   - **如果节点重复（层级关系一致 + 名称一致或意思相同）：**
     1. 使用 \`read\` 操作获取该节点的详细信息
     2. 比对需求与现有数据的字段差异
     3. 使用 \`update\` 操作更新节点（**严禁创建新节点**）
     4. 说明原因：避免在同一层级下创建意思相同的重复节点
   
   - **如果节点不重复（层级关系不同 或 名称完全不同）：**
     1. 确认所有必填字段
     2. 确认上层节点编号正确
     3. 使用 \`create\` 操作创建新节点
   
   - ✅ **操作完成后数据自动保存**，无需手动调用 \`saveIntentData()\`
   - 操作完成后，可再次调用 \`getIntentSummary()\` 确认结果

**⚠️ 违规示例（严禁以下操作）：**
- ❌ 错误1：跳过 getIntentSummary()，直接创建节点
- ❌ 错误2：看到需求就立即创建，不检查是否重复
- ❌ 错误3：发现同一层级下有意思相同的节点，仍然创建新节点
- ❌ 错误4：创建后发现重复，再删除重建
- ❌ 错误5：只检查名称完全相同，忽略名称意思相同的情况

**✅ 正确工作流程示例：**
1. 调用 getIntentSummary() 获取所有节点概况
2. 检查需求中的节点（如"工单处理"模块）是否与现有节点重复
3. 发现"工单管理"模块已存在于同一系统下，名称意思相同
4. 判定为重复，获取"工单管理"模块的详细信息
5. 比对需求与现有数据的差异
6. 使用 update 操作更新"工单管理"模块，而非创建"工单处理"模块
7. 说明原因：避免在同一系统下创建意思相同的重复模块

#### 创建操作规则
**🔴 首要规则：所有节点创建前必须先调用 \`getIntentSummary()\` 检查重复**

1. **重复检查（最高优先级）**: 
   - 适用于：系统、模块、场景、数据、行为、约束、编排、展示、验证
   - 必须检查：上层xx编号一致 + xx名称一致或意思相同
   - 如果重复：使用 update 更新，严禁创建新节点
   
2. **系统节点限制**: ⚠️ 系统节点禁止使用 create 操作，系统数据应通过其他方式初始化

3. **必填字段验证**: 所有节点的必填字段必须提供，不能为空

4. **上层节点关系**: 创建/更新有上层节点的类型时，必须先查询上层节点
   - 创建/更新**模块**：必须指定\`上层系统编号\`，先用\`manageSystems({action:"readAll"})\`查询
   - 创建/更新**场景**：必须指定\`上层模块编号\`，先用\`manageModules({action:"readAll"})\`查询；场景类型只在以下内容中选择：'信息管理', '流程处理', '数据看板', '工具制作', '页面嵌入'
   - 创建/更新**数据/行为/约束/编排/展示/验证**：必须指定\`上层场景编号\`，先用\`manageScenes({action:"readAll"})\`查询

5. **严禁乱写**: 不能随意编造不存在的上层节点编号

6. **字段完整性**: 按照数据结构定义提供所有字段，尤其是数组类型字段

#### 正确的操作流程
\`\`\`
步骤0：🔴 调用 getIntentSummary() → 检查节点是否已存在（强制性步骤）
步骤1：查询上层节点 → readAll获取可用节点列表
步骤2：选择父节点编号 → 从查询结果中选择合适的编号
步骤3：构建完整数据 → 包含所有必需字段和上层节点编号
步骤4：执行操作 → 如节点已存在则update，不存在则create
\`\`\`

#### 🌟 创建完整场景的最佳实践（强烈推荐）
**当需要创建一个新场景及其子节点时，优先使用 \`createFullScene\` 动作！**

**为什么推荐使用 createFullScene：**
- ✅ **效率更高**：一次调用创建场景及所有子节点，减少多次API调用
- ✅ **自动关联**：子节点自动关联到场景，无需手动指定上层场景编号
- ✅ **灵活可选**：子节点（数据、行为、约束、编排、展示、验证）都是可选的
- ✅ **减少超时**：避免多次单独创建节点导致的超时问题

**使用场景：**
- 需要创建新场景时
- 需要同时创建场景和多个子节点时
- 业务需求包含完整的场景定义时

**不适用场景：**
- 只需要更新已存在的场景（使用 manageScenes update）
- 只需要给已存在的场景添加子节点（使用对应的 manage 动作）

### 🚀 可用操作

#### 1. 数据加载
- \`loadIntentData()\` - 从后端实时加载最新的意图配置数据（自动更新缓存）
- \`getIntentSummary()\` - 获取全局概要，返回与 loadIntentData 相同结构，但只保留关键字段（编号、xx名称、描述、上层xx编号）

#### 2. 系统管理 (manageSystems)
**数据结构：** 编号、系统编号、系统名称、描述、建设动机、业务目标（字符串）、验证标准、使用角色（数组）、使用边界
**操作类型：** read(读取单个)、readAll(读取全部)、update(更新)、validate(验证)
**标识字段：** id(编号) 或 name(系统名称)（update 仅支持 id）
**⚠️ 重要限制：** 系统节点禁止使用 create 和 delete 操作，系统是核心配置不允许创建和删除
**注意：** 使用角色是数组类型，支持字符串自动转换（按逗号、分号或换行分割）

#### 3. 模块管理 (manageModules)
**数据结构：** 模块编号、模块名称、描述、上层系统编号、上层模块编号、建设动机、业务目标（字符串）、验证标准、使用角色（数组）、关键操作（字符串）、优先级
**操作类型：** create、read、readAll、update、delete、validate
**标识字段：** id(模块编号) 或 name(模块名称)
**重要：** 创建/更新时上层系统编号必须使用系统的「编号」字段，而非「系统编号」
**注意：** 使用角色是数组类型，支持字符串自动转换（按逗号、分号或换行分割）

#### 4. 场景管理 (manageScenes)
**数据结构：** 场景编号、场景名称、描述（必填）、场景类型、上层模块编号、使用角色（必填，数组）、建设动机（≥100字符）、业务目标（≥100字符）、验证标准（≥100字符）、优先级、触发条件
**操作类型：** create、read、readAll、update、delete、validate
**标识字段：** id(场景编号) 或 name(场景名称)
**重要：** 创建/更新时上层模块编号必须使用模块的「编号」字段，而非「模块编号」
**场景类型：** 支持中文或编号格式，自动转换并验证。可选值：'信息管理'、'流程处理'、'数据看板'、'工具制作'、'页面嵌入'、'系统模块'（或对应的系统编号）
**字段要求：** 描述不能为空；使用角色不能为空（数组类型，支持字符串自动转换）；建设动机、业务目标、验证标准每个字段不少于100个字符

#### 5. 数据管理 (manageData)
**数据结构：** 数据编号、数据名称、描述、上层场景编号、数据内容[{属性编号、属性名称、样式类型}]
**操作类型：** create、read、readAll、update、delete、validate
**标识字段：** id(数据编号) 或 name(数据名称)
**重要：** 创建/更新时上层场景编号必须使用场景的「编号」字段，而非「场景编号」

#### 6. 行为管理 (manageBehaviors)
**数据结构：** 行为编号、行为名称、描述、上层场景编号、行为内容[{操作编号、操作名称、行为主体、行为操作、行为客体、前置条件、执行结果}]
**操作类型：** create、read、readAll、update、delete、validate
**标识字段：** id(行为编号) 或 name(行为名称)

#### 7. 约束管理 (manageConstraints)
**数据结构：** 约束编号、约束名称、描述、上层场景编号、约束内容[{约束编号、约束名称、对象类型、对象名称、规则类型、约束规则}]
**操作类型：** create、read、readAll、update、delete、validate
**标识字段：** id(约束编号) 或 name(约束名称)

#### 8. 编排管理 (manageOrchestrations)
**数据结构：** 编排编号、编排名称、描述、上层场景编号、编排内容[{编排编号、编排名称、正常流程、回退说明、异常处理、撤销说明}]
**操作类型：** create、read、readAll、update、delete、validate
**标识字段：** id(编排编号) 或 name(编排名称)

#### 9. 展示管理 (manageDisplays)
**数据结构：** 展示编号、展示名称、描述、上层场景编号、展示内容[{页面编号、页面名称、页面说明、展示内容}]
**操作类型：** create、read、readAll、update、delete、validate
**标识字段：** id(展示编号) 或 name(展示名称)

#### 10. 验证管理 (manageValidations)
**数据结构：** 验证编号、验证名称、描述、上层场景编号、验证内容[{验证编号、验证名称、验证内容、验证方式、验证步骤、预期结果、其他说明}]
**操作类型：** create、read、readAll、update、delete、validate
**标识字段：** id(验证编号) 或 name(验证名称)

#### 11. 数据保存
- \`saveIntentData()\` - 手动保存意图数据到服务器（通常不需要，因为每次操作后会自动保存）
- ✅ **自动保存机制**：所有 create/update/delete 操作完成后会自动保存数据，无需手动调用

#### 12. 完整场景创建 (createFullScene) 🆕
**功能：** 一次性创建场景节点及其所有子节点（数据、行为、约束、编排、展示、验证）
**优势：** 
- 减少多次API调用，提高创建效率
- 子节点自动关联到创建的场景，无需手动指定上层场景编号
- 子节点可选，业务需求没有的可以不传

**参数结构：**
- \`场景\` - 【必填】场景节点数据
- \`数据\` - 【可选】数据节点数据
- \`行为\` - 【可选】行为节点数据
- \`约束\` - 【可选】约束节点数据
- \`编排\` - 【可选】编排节点数据
- \`展示\` - 【可选】展示节点数据
- \`验证\` - 【可选】验证节点数据

### ⚠️ 注意事项
1. **节点级后端保存**: create/update/delete操作会自动保存到后端，无需手动调用saveIntentData()
2. **层级关系**: 系统 → 模块 → 场景 → (数据/行为/约束/编排/展示/验证)
3. **必须先查询后创建/更新**: 创建或更新有上层节点的类型时，必须先用readAll查询上层节点，再使用查询到的「编号」字段
4. **上层节点编号规则（创建/更新）**: 
   - 上层系统编号 = 系统的「编号」字段（不是「系统编号」）
   - 上层模块编号 = 模块的「编号」字段（不是「模块编号」）
   - 上层场景编号 = 场景的「编号」字段（不是「场景编号」）
   - 若查询到的「编号」不是以 GroupChat_Inst 开头，需再次 readAll 确认
   - 统一使用「编号」字段进行节点关联
5. **字段完整性**: 确保提供数据结构中定义的所有字段
6. **数组字段智能转换**: 使用角色等数组字段支持字符串自动转换
   - 传数组：直接使用，如 \`["角色1", "角色2"]\`
   - 传字符串：自动按逗号、分号或换行分割成数组，如 \`"角色1,角色2"\` 或 \`"角色1；角色2"\`
7. **场景类型智能转换**: 场景类型支持中文名称，会自动转换为系统编号并通过验证
   - 可用中文：'信息管理'、'流程处理'、'数据看板'、'工具制作'、'页面嵌入'、'系统模块'
   - 中文会自动转为编号：\`"场景类型": "信息管理"\` → \`"OctoCM_System_970c8891_9ec0_4c14_a929_0bc5ab11bb2d"\`
   - 直接使用编号也支持：\`"场景类型": "OctoCM_System_d7896462_3648_489a_b259_c70876302cf9"\`（数据看板）
8. **验证机制**: 系统会自动验证必填字段和上层节点关系，不符合要求的操作会被拒绝
9. **错误提示**: 如果缺少上层节点编号，系统会返回可用的上层节点列表供选择
10. **标识节点**: 使用编号(id)或名称(name)标识节点
11. **级联删除**: 删除上层节点会级联删除下层节点
