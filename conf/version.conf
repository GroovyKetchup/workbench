    <Feature>	
           1.底层 增加了AI接入能力，支持模型查询，JayaTool调用，万能Ce11调用等入口
顺应AI的幻觉，调整丰富IDao接口

cmn-util 1.1.0
1.补充SSEMessage的rawData属性，允许透传SSE消息
2.补充FilterInterceptorHandler，可通过二开实现FilterInterceptor实现Filter拦截
3.添加Http接口注册信息的HTTP请求查询接口
4.修复ProxyUtil构建代理类在发布插件后仍然持有旧的ClassLoader导致Cell类加载冲突问题
5.修复beforeBatchCreateOrUpdate在预处理导入维度数据的错误，在跨平台导入时出现串码（uuid和code 关系对应不上时，如交叉串码，导出：（U1->A,U2->B), 导入：（U1->B,U2->A）），导致预导入没有将新增的数据添加上，后续实际导入会找不到关联维度数据
调整为先整批算映射，再分阶段“腾码 -> 改码 -> 新增 -> 正式更新”
6.优化CommonServlet里面System.out.println引起的并发IO阻塞
7.修复定时规则报错，  定时任务依然运行；当需要设置不运行的场景， 定时规则直接返回TimeRule.MINUTE_UNMATCH， 定时任务会运行一次
8.补充FieldDeclare注解，对加了注解的Dto属性可以进行值校验，提供生成JsonSchema的方法
9.调整CPrintService的轮询输出日志，取消1s睡眠间隔

fe-util 1.8.0
1.完善CReportService的reportError接收到的报错详细信息输出
    </Feature>
