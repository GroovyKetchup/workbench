<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OA 系统登录</title>
    <style>
        :root {
            --bg-1: #f4f6fb;
            --bg-2: #dfe7f6;
            --ink-1: #0b1220;
            --ink-2: #4b5565;
            --ink-3: #8a94a6;
            --primary: #111827;
            --primary-glow: rgba(17, 24, 39, 0.15);
            --accent: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.14);
            --card-bg: rgba(255, 255, 255, 0.86);
            --border: rgba(148, 163, 184, 0.35);
            --surface-1: rgba(255, 255, 255, 0.7);
            --surface-2: rgba(255, 255, 255, 0.6);
            --surface-3: rgba(148, 163, 184, 0.12);
            --surface-4: rgba(148, 163, 184, 0.18);
            --surface-5: rgba(255, 255, 255, 0.85);
            --shadow-inset: inset 0 0 0 1px rgba(148, 163, 184, 0.35);
            --brand-grad-1: #111827;
            --brand-grad-2: #4b5563;
            --switch-bg: rgba(148, 163, 184, 0.4);
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
            --shadow-lg: 0 30px 80px rgba(15, 23, 42, 0.18);
            --shadow-md: 0 18px 40px rgba(15, 23, 42, 0.12);
            --orb-1: radial-gradient(circle, rgba(59, 130, 246, 0.3), transparent 70%);
            --orb-2: radial-gradient(circle, rgba(16, 185, 129, 0.28), transparent 70%);
            --orb-3: radial-gradient(circle, rgba(245, 158, 11, 0.25), transparent 70%);
            --orb-opacity: 0.7;
            --radius-xl: 32px;
            --radius-lg: 22px;
            --radius-md: 14px;
            --transition: 0.25s ease;
        }

        [data-theme="dark"] {
            --bg-1: #0b0f1a;
            --bg-2: #0f172a;
            --ink-1: #f1f5f9;
            --ink-2: #d4d9e8;
            --ink-3: #9aa4ba;
            --primary: #f1f5f9;
            --primary-glow: rgba(148, 163, 184, 0.28);
            --accent: #7dd3fc;
            --accent-soft: rgba(125, 211, 252, 0.22);
            --card-bg: rgba(17, 24, 39, 0.82);
            --border: rgba(148, 163, 184, 0.22);
            --surface-1: rgba(17, 24, 39, 0.78);
            --surface-2: rgba(30, 41, 59, 0.76);
            --surface-3: rgba(30, 41, 59, 0.58);
            --surface-4: rgba(51, 65, 85, 0.55);
            --surface-5: rgba(17, 24, 39, 0.9);
            --shadow-inset: inset 0 0 0 1px rgba(148, 163, 184, 0.18);
            --brand-grad-1: #0b1220;
            --brand-grad-2: #1f2a44;
            --switch-bg: rgba(148, 163, 184, 0.4);
            --shadow-lg: 0 30px 70px rgba(8, 13, 25, 0.6);
            --shadow-md: 0 18px 36px rgba(8, 13, 25, 0.45);
            --orb-1: radial-gradient(circle, rgba(125, 211, 252, 0.22), transparent 70%);
            --orb-2: radial-gradient(circle, rgba(167, 243, 208, 0.18), transparent 70%);
            --orb-3: radial-gradient(circle, rgba(251, 191, 36, 0.16), transparent 70%);
            --orb-opacity: 0.55;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "SF Pro Display", "SF Pro Text", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at top, rgba(255, 255, 255, 0.9), rgba(219, 229, 247, 0.9)),
            linear-gradient(135deg, var(--bg-1), var(--bg-2));
            color: var(--ink-1);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 36px 20px;
            position: relative;
            overflow: hidden;
        }

        [data-theme="dark"] body {
            background: radial-gradient(circle at top, rgba(51, 65, 85, 0.4), rgba(15, 23, 42, 0.95)),
            linear-gradient(135deg, var(--bg-1), var(--bg-2));
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(10px);
            opacity: var(--orb-opacity);
            animation: float 12s ease-in-out infinite;
        }

        .orb.orb-1 {
            width: 280px;
            height: 280px;
            background: var(--orb-1);
            top: -80px;
            right: -80px;
        }

        .orb.orb-2 {
            width: 220px;
            height: 220px;
            background: var(--orb-2);
            bottom: -60px;
            left: -60px;
            animation-delay: -4s;
        }

        .orb.orb-3 {
            width: 180px;
            height: 180px;
            background: var(--orb-3);
            top: 45%;
            left: 55%;
            animation-delay: -7s;
        }

        .shell {
            width: min(1020px, 100%);
            display: grid;
            grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr);
            gap: 32px;
            align-items: center;
            z-index: 1;
        }

        .brand {
            padding: 28px;
        }

        .brand-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            border-radius: 999px;
            background: var(--surface-2);
            box-shadow: var(--shadow-inset);
            font-size: 13px;
            color: var(--ink-2);
        }

        .brand-mark {
            width: 26px;
            height: 26px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--brand-grad-1), var(--brand-grad-2));
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.2);
        }

        .brand h1 {
            font-size: clamp(32px, 4vw, 44px);
            letter-spacing: -0.02em;
            margin: 18px 0 14px;
        }

        .brand p {
            font-size: 16px;
            color: var(--ink-2);
            line-height: 1.6;
            max-width: 440px;
        }

        .brand .details {
            margin-top: 24px;
            display: grid;
            gap: 16px;
        }

        .detail-card {
            padding: 16px 18px;
            background: var(--surface-1);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
        }

        .detail-card h3 {
            font-size: 14px;
            margin-bottom: 6px;
        }

        .detail-card span {
            font-size: 13px;
            color: var(--ink-2);
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius-xl);
            padding: 34px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(20px);
            position: relative;
        }

        .card h2 {
            font-size: 24px;
            margin-bottom: 6px;
        }

        .card p {
            font-size: 14px;
            color: var(--ink-3);
        }

        .status-pill {
            margin-top: 18px;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--surface-3);
            color: var(--ink-2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ink-3);
            box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.16);
        }

        .form {
            margin-top: 26px;
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .field label {
            font-size: 13px;
            color: var(--ink-2);
        }

        .input-shell {
            position: relative;
        }

        .input-shell input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid transparent;
            background: var(--surface-5);
            box-shadow: inset 0 0 0 1px var(--border);
            font-size: 15px;
            color: var(--ink-1);
            transition: var(--transition);
        }

        .input-shell input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        .input-shell .assist {
            position: absolute;
            top: 50%;
            right: 16px;
            transform: translateY(-50%);
            font-size: 12px;
            color: var(--ink-3);
        }

        .toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            background: var(--surface-3);
            border: 1px solid var(--border);
            font-size: 13px;
            color: var(--ink-2);
        }

        .switch {
            width: 44px;
            height: 24px;
            border-radius: 999px;
            background: var(--switch-bg);
            position: relative;
            transition: var(--transition);
            cursor: pointer;
        }

        .switch::after {
            content: "";
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: white;
            position: absolute;
            top: 3px;
            left: 3px;
            transition: var(--transition);
            box-shadow: 0 6px 12px rgba(15, 23, 42, 0.25);
        }

        .switch.active {
            background: var(--accent);
        }

        .switch.active::after {
            left: 23px;
        }

        .actions {
            display: grid;
            gap: 12px;
            margin-top: 6px;
        }

        .btn {
            border: none;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn.primary {
            background: linear-gradient(135deg, #111827, #1f2937);
            color: white;
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.25);
        }

        .btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 20px 36px rgba(15, 23, 42, 0.28);
        }

        .btn.secondary {
            background: var(--surface-2);
            color: var(--ink-2);
            border: 1px solid var(--border);
        }

        .btn.secondary:hover {
            border-color: rgba(59, 130, 246, 0.4);
            color: var(--ink-1);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .hint {
            font-size: 12px;
            color: var(--ink-3);
            margin-top: 8px;
            line-height: 1.5;
        }

        .form-switch {
            margin-top: 22px;
            display: inline-flex;
            gap: 8px;
            padding: 6px;
            border-radius: 999px;
            background: var(--surface-4);
            border: 1px solid var(--border);
        }

        .form-switch button {
            border: none;
            background: transparent;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 13px;
            color: var(--ink-2);
            cursor: pointer;
            transition: var(--transition);
        }

        .form-switch button.active {
            background: var(--surface-2);
            color: var(--ink-1);
            box-shadow: var(--shadow-md);
        }

        .hidden {
            display: none;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(12px);
            }
        }

        @media (max-width: 900px) {
            .shell {
                grid-template-columns: 1fr;
            }

            .brand {
                padding: 10px 0;
                text-align: center;
            }

            .brand p {
                margin: 0 auto;
            }

            .brand .details {
                grid-template-columns: 1fr;
            }

            .card {
                padding: 28px;
            }
        }
    </style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<main class="shell">
    <section class="brand">
        <div class="brand-badge">
            <div class="brand-mark"></div>
            智能 OA 办公平台
        </div>
        <h1>欢迎回到协同办公中心</h1>
        <p>集中处理流程、审批、公告与组织协作。一次登录即可进入您的每日工作节奏。</p>
        <div class="details">
            <div class="detail-card">
                <h3>流程与审批</h3>
                <span>统一查看待办事项，按优先级完成审批与流转。</span>
            </div>
            <div class="detail-card">
                <h3>组织通讯录</h3>
                <span>快速找到团队成员与部门联系人，沟通协作更高效。</span>
            </div>
            <div class="detail-card">
                <h3>移动办公</h3>
                <span>跨设备同步工作进度，随时掌握业务动态。</span>
            </div>
        </div>
    </section>

    <section class="card">
        <h2>账户入口</h2>
        <p>使用工作账号进入 OA 系统，或先注册新的组织身份。</p>

        <div class="form-switch">
            <button type="button" id="loginTab" class="active">登录</button>
            <button type="button" id="registerTab">注册</button>
        </div>

        <div class="status-pill" id="statusPill">
            <span class="status-dot" id="statusDot"></span>
            <span id="statusText">请输入账号与密码</span>
        </div>

        <form class="form" id="loginForm">
            <div class="field">
                <label for="userName">账号</label>
                <div class="input-shell">
                    <input id="userName" name="userName" type="text" placeholder="请输入用户名"
                           autocomplete="username"/>
                    <span class="assist" id="userHint"></span>
                </div>
            </div>

            <div class="field">
                <label for="password">密码</label>
                <div class="input-shell">
                    <input id="password" name="password" type="password" placeholder="请输入密码"
                           autocomplete="current-password"/>
                    <span class="assist" id="capsHint"></span>
                </div>
            </div>

            <div class="toggle">
                <span>记住我的登录状态</span>
                <div class="switch" id="rememberToggle" role="switch" aria-checked="false"></div>
            </div>

            <div class="actions">
                <button type="submit" class="btn primary" id="submitBtn">立即登录</button>
            </div>

        </form>

        <form class="form hidden" id="registerForm">
            <div class="field">
                <label for="fullName">姓名</label>
                <div class="input-shell">
                    <input id="fullName" name="fullName" type="text" placeholder="请输入真实姓名" autocomplete="name"/>
                </div>
            </div>

            <div class="field">
                <label for="mobile">手机号</label>
                <div class="input-shell">
                    <input id="mobile" name="mobile" type="tel" placeholder="请输入手机号" autocomplete="tel"/>
                </div>
            </div>

            <div class="field">
                <label for="newPassword">设置密码</label>
                <div class="input-shell">
                    <input id="newPassword" name="newPassword" type="password" placeholder="请输入新密码"/>
                </div>
            </div>

            <div class="field">
                <label for="confirmPassword">确认密码</label>
                <div class="input-shell">
                    <input id="confirmPassword" name="confirmPassword" type="password" placeholder="再次输入密码"/>
                </div>
            </div>

            <div class="actions">
                <button type="button" class="btn primary" id="registerSubmitBtn" disabled>确认注册</button>
            </div>

            <div class="actions">
                <button type="button" class="btn secondary" id="toLoginBtn">返回登录</button>
            </div>

        </form>

        <div class="hint">请使用企业账号登录，注册通道正在准备中。</div>
    </section>
</main>

<script src="https://kwaidoo.com/cdn_cdp/sdk/cdp_sdk/panelx-sdk-proxy.js"></script>
<script src="https://kwaidoo.com/cdn_cdp/sdk/cdp_sdk/cdp-sdk-1.2.0.min.js"></script>
<script>
    const BUS_DOMAIN_CODE = '{{BUS_DOMAIN_CODE}}';
    const UI = {
        form: document.getElementById('loginForm'),
        registerForm: document.getElementById('registerForm'),
        userName: document.getElementById('userName'),
        password: document.getElementById('password'),
        submitBtn: document.getElementById('submitBtn'),
        registerSubmitBtn: document.getElementById('registerSubmitBtn'),
        statusText: document.getElementById('statusText'),
        statusDot: document.getElementById('statusDot'),
        rememberToggle: document.getElementById('rememberToggle'),
        userHint: document.getElementById('userHint'),
        capsHint: document.getElementById('capsHint'),
        toLoginBtn: document.getElementById('toLoginBtn'),
        loginTab: document.getElementById('loginTab'),
        registerTab: document.getElementById('registerTab')
    };

    let sdk = null;
    let remember = false;

    async function notify(message, type = 'info', description = '') {
        if (!window.semApp?.cdpSdk?.toast) return;
        const options = {type};
        if (description) options.description = description;
        await window.semApp.cdpSdk.toast(message, options);
    }

    function setStatus(text, color = 'default') {
        UI.statusText.textContent = text;
        if (color === 'success') {
            UI.statusDot.style.background = 'var(--success)';
        } else if (color === 'warning') {
            UI.statusDot.style.background = 'var(--warning)';
        } else if (color === 'error') {
            UI.statusDot.style.background = 'var(--danger)';
        } else {
            UI.statusDot.style.background = 'var(--ink-3)';
        }
    }

    function setLoading(isLoading) {
        UI.submitBtn.disabled = isLoading;
        UI.submitBtn.textContent = isLoading ? '正在登录...' : '立即登录';
    }

    function clearMessage() {
    }

    function refreshApp() {
        try {
            if (window.top && window.top.location) {
                window.top.location.reload();
                return;
            }
        } catch (error) {
        }
        try {
            if (window.parent && window.parent.location) {
                window.parent.location.reload();
                return;
            }
        } catch (error) {
        }
        window.location.reload();
    }

    function normalizeErrorMessage(error) {
        if (!error) return '登录失败，请稍后再试';
        const raw = typeof error === 'string' ? error : error.message || '';
        try {
            const parsed = JSON.parse(raw);
            if (parsed.errorDescription) return parsed.errorDescription;
        } catch (parseError) {
            return raw || '登录失败，请稍后再试';
        }
        return raw || '登录失败，请稍后再试';
    }

    function toggleRemember() {
        remember = !remember;
        UI.rememberToggle.classList.toggle('active', remember);
        UI.rememberToggle.setAttribute('aria-checked', remember ? 'true' : 'false');
    }

    function detectCaps(event) {
        if (event.getModifierState && event.getModifierState('CapsLock')) {
            UI.capsHint.textContent = '大写锁定已开启';
        } else {
            UI.capsHint.textContent = '';
        }
    }

    function applyTheme(themeConfig) {
        if (!themeConfig || !themeConfig.preset) return;
        const colors = themeConfig.mode === 'dark' ? themeConfig.preset.dark : themeConfig.preset.light;
        if (!colors) return;
        document.documentElement.setAttribute('data-theme', themeConfig.mode === 'dark' ? 'dark' : 'light');
        document.documentElement.style.setProperty('--accent', `hsl(${colors.primary})`);
        document.documentElement.style.setProperty('--accent-soft', `hsla(${colors.primary}, 0.14)`);
        document.documentElement.style.setProperty('--primary', `hsl(${colors.text || colors.primary})`);
    }

    async function initPanelX() {
        if (!window.PanelXSdkProxy && !window.PanelXSdk) {
            throw new Error('系统暂时不可用，请稍后再试');
        }
        const PanelSDK = window.PanelXSdkProxy || window.PanelXSdk;
        sdk = new PanelSDK({
            busDomainCode: BUS_DOMAIN_CODE,
            appCode: BUS_DOMAIN_CODE
        });
    }

    async function performLogin(userName, password, fromAction = false) {
        if (!userName || !password) {
            const tip = '请填写账号和密码';
            setStatus(tip, 'warning');
            if (!fromAction) await notify(tip, 'warning');
            throw new Error(tip);
        }

        setLoading(true);
        clearMessage();
        setStatus('正在核验账号信息', 'warning');

        try {
            const result = await sdk.user.login({userName, password});
            const displayName = result.user?.name || result.user?.userName || '用户';
            setStatus(`欢迎回来，${displayName}`, 'success');
            if (!fromAction) {
                await notify('登录成功', 'success');
                setTimeout(() => {
                    refreshApp();
                }, 450);
            }
            return result;
        } catch (error) {
            const message = normalizeErrorMessage(error);
            setStatus('登录失败，请检查账号或密码', 'error');
            clearMessage();
            if (!fromAction) await notify('登录失败', 'error', message);
            throw error;
        } finally {
            setLoading(false);
        }
    }

    function registerActions() {
        if (!window.semApp?.cdpSdk) return;

        const actionHandlers = {
            loginAccount: async (params) => {
                const {userName, password} = params || {};
                const result = await performLogin(userName, password, true);
                return {
                    user: result.user || {},
                    token: result.token || ''
                };
            }
        };

        const actionDefinitions = [
            {
                actionName: 'loginAccount',
                actionAlias: '账号登录',
                actionDescription: '通过用户名与密码执行登录，并返回用户信息',
                actionParameterSchema: {
                    type: 'object',
                    properties: {
                        userName: {
                            type: 'string',
                            description: '登录用户名'
                        },
                        password: {
                            type: 'string',
                            description: '登录密码'
                        }
                    },
                    required: ['userName', 'password']
                },
                actionReturnSchema: {
                    type: 'object',
                    properties: {
                        user: {
                            type: 'object',
                            description: '用户信息对象'
                        },
                        token: {
                            type: 'string',
                            description: '登录令牌'
                        }
                    },
                    required: ['user', 'token']
                }
            }
        ];

        const actionGuidance = `
# 登录页操作指南

该页面提供账号登录能力，可用于验证用户名和密码并返回用户信息。

## 可用动作

- \`loginAccount({"userName": "用户名", "password": "密码"})\`
- 执行登录并返回用户信息与 token
- 当账号或密码缺失时会抛出错误

## 使用场景

1. 用户输入账号密码后调用登录
2. AI 助手自动触发账号登录以便继续操作

## 返回结构

\`{ user: {...}, token: "..." }\`
`.trim();

        window.semApp.cdpSdk.setActions({
            guidance: actionGuidance,
            definitions: actionDefinitions,
            handlers: actionHandlers,
            registrationDelay: 100
        });
    }

    UI.rememberToggle.addEventListener('click', toggleRemember);
    UI.password.addEventListener('keyup', detectCaps);
    UI.form.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (!sdk) {
            await notify('系统暂未就绪，请稍后重试', 'error');
            return;
        }
        const userName = UI.userName.value.trim();
        const password = UI.password.value;
        await performLogin(userName, password);
    });

    function switchToRegister() {
        UI.form.classList.add('hidden');
        UI.registerForm.classList.remove('hidden');
        UI.loginTab.classList.remove('active');
        UI.registerTab.classList.add('active');
        setStatus('注册通道正在准备中', 'warning');
    }

    function switchToLogin() {
        UI.registerForm.classList.add('hidden');
        UI.form.classList.remove('hidden');
        UI.registerTab.classList.remove('active');
        UI.loginTab.classList.add('active');
        setStatus('请使用工作账号登录', 'success');
    }

    UI.toLoginBtn.addEventListener('click', switchToLogin);
    UI.loginTab.addEventListener('click', switchToLogin);
    UI.registerTab.addEventListener('click', switchToRegister);

    async function init() {
        try {
            await initPanelX();
            setStatus('系统已准备就绪', 'success');
        } catch (error) {
            setStatus('系统暂不可用', 'error');
            await notify(error.message || '系统暂不可用', 'error');
        }

        if (window.semApp?.cdpSdk) {
            try {
                const theme = await window.semApp.cdpSdk.getTheme();
                applyTheme(theme);
                window.semApp.cdpSdk.onThemeChange((newTheme) => {
                    applyTheme(newTheme);
                });
            } catch (error) {
                console.warn('主题同步失败', error);
            }

            registerActions();
        }
    }

    init();
</script>
<script>
    if (!document.documentElement.hasAttribute('data-theme')) {
        const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
    }
</script>
</body>
</html>
